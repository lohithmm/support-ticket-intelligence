spring.application.name=support-ticket-intelligence

# AI - Ollama runs on host machine
spring.ai.model.chat=ollama
spring.ai.model.embedding=ollama
spring.ai.ollama.base-url=http://host.docker.internal:11434
spring.ai.ollama.chat.options.model=llama3.2:1b
spring.ai.ollama.embedding.options.model=mxbai-embed-large:latest

# H2 embedded DB (persisted to Docker volume)
spring.datasource.url=jdbc:h2:file:/data/supportiq;AUTO_SERVER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=supportiq
spring.datasource.password=supportiq123
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# Qdrant - runs as Docker service
spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.host=qdrant
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=support-tickets

server.port=8080
